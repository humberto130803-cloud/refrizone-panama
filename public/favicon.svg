<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0d1233"/>
      <stop offset="100%" stop-color="#0a0e27"/>
    </linearGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f5b800"/>
      <stop offset="100%" stop-color="#d4a017"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="32" height="32" rx="7" fill="url(#bg)"/>
  <rect x="0.5" y="0.5" width="31" height="31" rx="6.5" fill="none" stroke="white" stroke-opacity="0.1" stroke-width="0.5"/>

  <!-- Snowflake behind R -->
  <g transform="translate(16,11)" opacity="0.3">
    <line x1="0" y1="-5" x2="0" y2="5" stroke="#3b82f6" stroke-width="1" stroke-linecap="round"/>
    <line x1="-4.3" y1="-2.5" x2="4.3" y2="2.5" stroke="#3b82f6" stroke-width="1" stroke-linecap="round"/>
    <line x1="-4.3" y1="2.5" x2="4.3" y2="-2.5" stroke="#3b82f6" stroke-width="1" stroke-linecap="round"/>
    <circle r="1.2" fill="#3b82f6" opacity="0.5"/>
  </g>

  <!-- R -->
  <text x="16" y="22.5" text-anchor="middle" font-family="'Arial Black', 'Helvetica Neue', Arial, sans-serif" font-weight="900" font-size="17" fill="url(#gold)">R</text>

  <!-- Frost dot -->
  <circle cx="23" cy="7.5" r="1.3" fill="#60a5fa" opacity="0.6"/>

  <!-- Gold underline -->
  <rect x="8" y="25.5" width="16" height="1.5" rx="0.75" fill="url(#gold)" opacity="0.5"/>
</svg>
